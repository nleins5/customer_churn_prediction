artifacts_root: artifacts

data_ingestion:
  root_dir: artifacts/data_ingestion
  local_data_file: data/playground-series-s6e3.zip
  unzip_dir: artifacts/data_ingestion

data_validation:
  root_dir: artifacts/data_validation
  unzip_data_dir: artifacts/data_ingestion/train.csv
  STATUS_FILE: artifacts/data_validation/status.txt

data_transformation:
  root_dir: artifacts/data_transformation
  train_data_path: artifacts/data_ingestion/train.csv
  test_data_path: artifacts/data_ingestion/test.csv
  preprocessor_path: artifacts/data_transformation/preprocessor.joblib

model_trainer:
  root_dir: artifacts/model_trainer
  train_data_path: artifacts/data_transformation/train_transformed.npz
  test_data_path: artifacts/data_transformation/test_transformed.npz
  model_name: model.joblib
  mlflow_uri: ""

model_evaluation:
  root_dir: artifacts/model_evaluation
  test_data_path: artifacts/data_transformation/test_transformed.npz
  model_path: artifacts/model_trainer/model.joblib
  metric_file_name: artifacts/model_evaluation/metrics.json
  mlflow_uri: ""

prediction:
  root_dir: artifacts/prediction
  model_path: artifacts/model_trainer/model.joblib
  preprocessor_path: artifacts/data_transformation/preprocessor.joblib
  test_data_path: artifacts/data_ingestion/test.csv
  output_path: submission.csv
